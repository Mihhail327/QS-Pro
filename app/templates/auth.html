<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — QuickSnippet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-md bg-gray-800 p-8 rounded-3xl border border-gray-700 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                QS Pro
            </h1>
            <p class="text-gray-400 mt-2">Авторизация</p>
        </div>

        <form hx-post="/auth/login" hx-target="#auth-message" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2 ml-1">Логин</label>
                <input type="text" name="username" required 
                       class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2 ml-1">Пароль</label>
                <input type="password" name="password" required 
                       class="w-full bg-gray-900 border border-gray-700 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition text-white">
            </div>

            <label class="flex items-center gap-3 text-sm text-gray-400 cursor-pointer ml-1">
                <input type="checkbox" name="is_dev" value="true" class="w-5 h-5 rounded border-gray-700 bg-gray-900 text-blue-600">
                Я разработчик (Dev Mode)
            </label>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button type="button" hx-post="/auth/register" hx-target="#auth-message"
                        class="bg-gray-700 hover:bg-gray-600 py-4 rounded-2xl font-semibold transition active:scale-95">
                    Регистрация
                </button>
                <button type="submit" 
                        class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 py-4 rounded-2xl font-bold shadow-lg transition active:scale-95">
                    Войти
                </button>
            </div>

            <div id="auth-message" class="text-center text-sm font-medium min-h-[20px]"></div>
        </form>

        <div class="mt-8 text-center border-t border-gray-700 pt-6">
            <a href="/" class="text-sm text-gray-500 hover:text-blue-400 transition inline-flex items-center gap-2">
                <span>←</span> Вернуться на главную
            </a>
        </div>
    </div>

</body>
</html>
