<!DOCTYPE html>
<html lang="ru" class="bg-[#070a13] text-gray-300 antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Врата — QuickSnippet Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/static/js/translations.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: ({ opacityValue }) => opacityValue !== undefined ? `rgb(var(--bg-main) / ${opacityValue})` : 'rgb(var(--bg-main))',
                        electric: ({ opacityValue }) => opacityValue !== undefined ? `rgb(var(--accent) / ${opacityValue})` : 'rgb(var(--accent))',
                        acid: ({ opacityValue }) => opacityValue !== undefined ? `rgb(var(--accent-secondary) / ${opacityValue})` : 'rgb(var(--accent-secondary))',
                        darkglass: ({ opacityValue }) => opacityValue !== undefined ? `rgb(var(--bg-glass) / ${opacityValue})` : 'rgb(var(--bg-glass))',
                    },
                    boxShadow: {
                        'neon': 'var(--shadow-neon)',
                        'neon-strong': 'var(--shadow-neon-strong)',
                        'acid-glow': 'var(--shadow-acid-glow)'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-electric selection:text-midnight"
      x-data="{
          lang: localStorage.getItem('lang') || 'ru',
          theme: localStorage.getItem('theme') || 'cyber-baroque',
          t(key) {
              return (window.TRANSLATIONS && window.TRANSLATIONS[this.lang] && window.TRANSLATIONS[this.lang][key]) || key;
          },
          setLang(newLang) {
              this.lang = newLang;
              localStorage.setItem('lang', newLang);
          }
      }"
      x-init="
          document.documentElement.setAttribute('data-theme', theme);
          $watch('lang', val => localStorage.setItem('lang', val));
          document.title = t('gates_title');
          $watch('lang', val => document.title = t('gates_title'));
      ">

    <div class="absolute inset-0 opacity-[0.03] pointer-events-none" 
         style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');">
    </div>

    <div class="relative z-10 w-full max-w-md p-8 rounded-2xl bg-darkglass/60 backdrop-blur-xl border border-electric/20 shadow-neon">
        
        <!-- Language Switcher -->
        <div class="flex justify-end gap-3 mb-4 relative z-20">
            <button type="button" @click="setLang('ru')" :class="lang === 'ru' ? 'text-electric font-bold' : 'text-gray-500 hover:text-gray-300'" class="text-xs font-mono transition-colors">RU</button>
            <button type="button" @click="setLang('en')" :class="lang === 'en' ? 'text-electric font-bold' : 'text-gray-500 hover:text-gray-300'" class="text-xs font-mono transition-colors">EN</button>
            <button type="button" @click="setLang('et')" :class="lang === 'et' ? 'text-electric font-bold' : 'text-gray-500 hover:text-gray-300'" class="text-xs font-mono transition-colors">ET</button>
        </div>

        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-electric tracking-widest uppercase shadow-electric">
                QS<span class="text-acid">_Pro</span>
            </h1>
            <p class="text-xs text-gray-500 mt-2 tracking-widest uppercase font-mono" x-text="t('gates_subtitle')">Авторизация терминала</p>
        </div>

        <form hx-post="/auth/login" hx-target="#auth-message" class="space-y-6">
            
            <div class="space-y-2">
                <label class="block text-xs font-mono text-electric/70 ml-1" x-text="t('login_label')">ИДЕНТИФИКАТОР / ЛОГИН</label>
                <input type="text" name="username" required
                       @input="$el.value = $el.value.toLowerCase()"
                       autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="username"
                       class="w-full bg-midnight/50 border border-gray-800 focus:border-electric rounded-xl px-4 py-3 text-gray-200 outline-none transition-all duration-300 placeholder-gray-700 focus:shadow-neon"
                       placeholder="Nexus_ID" :placeholder="t('username_placeholder')">
            </div>

            <div class="space-y-2" x-data="{ showPassword: false }">
                <label class="block text-xs font-mono text-electric/70 ml-1" x-text="t('password_label')">КРИПТО-КЛЮЧ / ПАРОЛЬ</label>
                <div class="relative">
                    <input :type="showPassword ? 'text' : 'password'" name="password" required
                           autocapitalize="none" autocorrect="off" spellcheck="false"
                           class="w-full bg-midnight/50 border border-gray-800 focus:border-electric rounded-xl pl-4 pr-12 py-3 text-gray-200 outline-none transition-all duration-300 placeholder-gray-700 focus:shadow-neon"
                           placeholder="••••••••••••" :placeholder="t('password_placeholder')">
                    <button type="button" @click="showPassword = !showPassword" 
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-electric transition-colors focus:outline-none">
                        <!-- Eye Open -->
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" x-show="!showPassword">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <!-- Eye Closed -->
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" x-show="showPassword" style="display: none;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>

            <label class="flex items-center gap-3 text-xs font-mono text-gray-400 cursor-pointer ml-1 hover:text-electric/80 transition-colors">
                <input type="checkbox" name="is_dev" value="true" 
                       class="w-4 h-4 rounded border-gray-700 bg-midnight text-electric accent-electric focus:ring-electric focus:ring-offset-midnight">
                <span x-text="t('dev_mode_label')">Я разработчик (Dev Mode)</span>
            </label>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button type="button" hx-post="/auth/register" hx-target="#auth-message"
                        class="bg-gray-800/50 hover:bg-gray-700/50 border border-gray-700 hover:border-gray-500 text-gray-300 py-3 rounded-xl font-mono text-sm uppercase tracking-wider transition-all duration-300 active:scale-95"
                        x-text="t('register')">
                    Регистрация
                </button>
                <button type="submit" 
                        class="bg-electric/10 hover:bg-electric/20 border border-electric text-electric shadow-[inset_0_0_10px_rgba(0,242,254,0.1)] py-3 rounded-xl font-bold font-mono text-sm uppercase tracking-wider transition-all duration-300 hover:shadow-neon-strong active:scale-95"
                        x-text="t('login')">
                    Вход
                </button>
            </div>

            <div id="auth-message" class="text-center text-sm font-mono min-h-[20px] transition-all duration-300"></div>
        </form>

        <div class="mt-8 text-center border-t border-gray-800/60 pt-6">
            <a href="/" class="text-xs font-mono text-gray-500 hover:text-electric transition-colors inline-flex items-center gap-2">
                <span class="text-electric">←</span> <span x-text="t('back_to_core')">Вернуться в ядро</span>
            </a>
        </div>
    </div>

</body>
</html>
