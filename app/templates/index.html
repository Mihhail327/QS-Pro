<!DOCTYPE html>
<html lang="ru">
<head>
    {% include 'components/head_meta.html' %} 
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans" 
      x-data="{ role: 'user', openModal: null, hasError: false, showSidebar: false }">

    {% include 'components/sidebar.html' %}

    <main class="md:ml-72 transition-all duration-300">
        <nav class="max-w-7xl mx-auto p-6 flex justify-between items-center">
    <div class="hidden md:block text-[10px] font-black text-gray-600 uppercase tracking-widest">
        Рабочая область
    </div>

    <div class="flex items-center gap-4 ml-auto"> 
        <div id="sync-status" class="flex items-center gap-2">
             <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
             <span class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">
                 Синхронизировано
             </span>
        </div>
    </div>
</nav>

        <div class="container mx-auto px-4 py-6">
            <div class="max-w-2xl mb-10">
                <div class="relative group">
                    <input type="text" name="q" placeholder="Поиск по зашифрованным мыслям..." 
                           class="w-full bg-gray-800/40 border border-gray-700/50 rounded-2xl py-4 px-12 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all backdrop-blur-md shadow-lg"
                           hx-get="/snippets/list" hx-trigger="keyup changed delay:300ms" hx-target="#snippets-list" hx-indicator="#search-spinner">
                    <svg class="absolute left-4 top-4 w-5 h-5 text-gray-600 group-focus-within:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <div id="search-spinner" class="htmx-indicator absolute right-4 top-4">
                        <div class="animate-spin h-5 w-5 border-2 border-blue-500 border-t-transparent rounded-full"></div>
                    </div>
                </div>
            </div>

            {% include 'components/categories.html' %}

            <div id="snippets-list" class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start" 
                 hx-get="/snippets/list" hx-trigger="load">
            </div>
        </div>
    </main>

    {% include 'components/mobile_nav.html' %}
    {% include 'components/modal.html' %}
    
    <button @click="openModal = 'idea'; $nextTick(() => document.querySelector('form').reset())" 
            class="fixed bottom-24 right-6 md:bottom-12 md:right-12 z-50 w-16 h-16 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-90 transition-all border-4 border-gray-900 md:border-none">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    {% include 'components/error_game.html' %}
    <script src="/static/js/game.js"></script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/static/js/sw.js')
        .then(reg => console.log('🚀 Service Worker готов!', reg))
        .catch(err => console.error('❌ Ошибка SW:', err));
    });
  }
</script>
</body>
</html>
