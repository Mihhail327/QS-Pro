<div x-show="showViewModal" 
     x-cloak
     x-transition.opacity.duration.300ms
     class="fixed inset-0 z-[120] flex items-center justify-center p-4 md:p-8 bg-midnight/95 backdrop-blur-xl">
    
    <div @click.away="showViewModal = false" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="scale-95 opacity-0"
         x-transition:enter-end="scale-100 opacity-100"
         class="bg-darkglass border border-electric/40 rounded-3xl w-full max-w-5xl max-h-full flex flex-col shadow-neon-strong overflow-hidden relative">
        
        <div class="flex justify-between items-center p-6 border-b border-gray-800/60 bg-midnight/50">
            <div>
                <h3 class="text-xl md:text-2xl font-black text-electric uppercase tracking-widest shadow-electric" x-text="viewData.cat + ' // ' + viewData.sub"></h3>
                <p class="text-xs text-gray-500 font-mono mt-1" x-text="viewData.tags"></p>
            </div>
            <button @click="showViewModal = false" class="text-gray-500 hover:text-red-500 text-4xl transition-colors">&times;</button>
        </div>

        <div class="p-6 overflow-y-auto custom-scrollbar flex-grow bg-midnight/20">
            
            <template x-if="viewData.image">
                <div class="mb-6 rounded-xl overflow-hidden border border-gray-800/80 shadow-lg">
                    <img :src="viewData.image" class="w-full h-auto object-cover"/>
                </div>
            </template>

            <button 
                @click="navigator.clipboard.writeText(viewData.text); $el.innerText = t('copied'); setTimeout(() => $el.innerText = t('copy'), 2000)"
                class="absolute top-4 right-6 text-xs font-mono text-electric border border-electric/50 px-2 py-1 rounded hover:bg-electric/20 transition-all"
                x-text="t('copy')">
                Копировать
            </button>

            <pre class="rounded-xl overflow-hidden bg-black/50 border border-white/5"><code :class="'language-' + (viewData.language || 'text')" x-init="$watch('viewData.text', value => { $nextTick(() => Prism.highlightAll()); })" x-text="viewData.text"></code></pre>
            
            <template x-if="viewData.note">
                <div class="mt-6 p-4 bg-black/40 rounded-xl border-l-2 border-acid/40">
                    <p class="text-sm text-gray-400 italic font-mono" x-text="'💡 ' + viewData.note"></p>
                </div>
            </template>
        </div>

        <div class="p-4 border-t border-gray-800/60 bg-midnight/50 flex justify-end">
            <button @click="showViewModal = false" class="px-8 py-3 bg-electric/10 border border-electric text-electric rounded-xl font-mono text-sm uppercase tracking-widest hover:shadow-neon hover:bg-electric/20 transition-all cursor-pointer" x-text="t('close_archive')">
                Закрыть архив
            </button>
        </div>
    </div>
</div>
