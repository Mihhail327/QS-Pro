<div x-show="openModal" 
     x-cloak
     x-effect="if(openModal) $nextTick(() => $el.querySelector('textarea').focus())"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     class="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4 bg-black/80 backdrop-blur-md">
    
    <div @click.away="openModal = null" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-y-full md:translate-y-10 md:opacity-0"
         x-transition:enter-end="translate-y-0 md:opacity-100"
         class="bg-gray-900 w-full md:max-w-lg rounded-t-3xl md:rounded-3xl p-8 border-t md:border border-gray-800 shadow-2xl transition-all max-h-[90vh] overflow-y-auto custom-scrollbar">
        
        <div class="flex justify-between items-center mb-6">
            <div>
                <h3 class="text-xl font-bold text-white tracking-tight" 
                    x-text="{
                        'idea': 'Новая идея 💡', 
                        'code': 'Сниппет кода 💻', 
                        'study': 'Учебная заметка 🎓', 
                        'important': 'Важное событие 📌'
                    }[openModal] || 'Заметка 📝'"></h3>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-1 font-black">Шифрование AES-256</p>
            </div>
            <button @click="openModal = null" class="text-gray-500 hover:text-white text-3xl transition-colors">&times;</button>
        </div>

        <form hx-post="/snippets/create" 
              hx-target="#snippets-list" 
              hx-swap="innerHTML" 
              @htmx:after-request="if(event.detail.successful) { openModal = null; $el.reset(); }">
            
            <input type="hidden" name="category" :value="openModal">

            <div class="grid grid-cols-2 gap-2 mb-6">
                <template x-for="c in [
                    {id: 'idea', label: 'Идея'}, 
                    {id: 'code', label: 'Код'}, 
                    {id: 'study', label: 'Учеба'}, 
                    {id: 'important', label: 'Важно'}
                ]">
                    <label class="cursor-pointer">
                        <input type="radio" :value="c.id" x-model="openModal" class="hidden peer">
                        <div class="text-center p-2.5 rounded-xl border border-gray-800 bg-gray-800/30 text-[10px] font-black peer-checked:bg-blue-600 peer-checked:border-blue-500 peer-checked:text-white text-gray-500 transition-all uppercase tracking-widest" 
                             x-text="c.label"></div>
                    </label>
                </template>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] uppercase font-black text-gray-600 ml-1 mb-1 block">Подраздел</label>
                        <input type="text" name="sub_category" placeholder="Напр. Python" 
                               class="w-full bg-gray-950 border border-gray-800 rounded-xl py-3 px-4 text-white text-xs focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-black text-gray-600 ml-1 mb-1 block">Теги</label>
                        <input type="text" name="tags" placeholder="work hack" 
                               class="w-full bg-gray-950 border border-gray-800 rounded-xl py-3 px-4 text-white text-xs focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="text-[9px] uppercase font-black text-gray-600 ml-1 mb-1 block">Контент</label>
                    <textarea name="content" required 
                              class="w-full bg-gray-950 border border-gray-800 rounded-2xl p-5 text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-gray-700 custom-scrollbar text-sm leading-relaxed" 
                              rows="4" 
                              placeholder="Твои мысли под надежным замком..."></textarea>
                </div>

                <div>
                    <label class="text-[9px] uppercase font-black text-gray-600 ml-1 mb-1 block">Аннотация (Личная заметка)</label>
                    <input type="text" name="note" placeholder="Краткое описание для контекста..." 
                           class="w-full bg-gray-950 border border-gray-800 rounded-xl py-3 px-4 text-white text-xs focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                </div>
                
                <button type="submit" 
                        class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-[0.98] uppercase tracking-widest text-xs">
                    Зашифровать и сохранить
                </button>
            </div>
        </form>
    </div>
</div>
