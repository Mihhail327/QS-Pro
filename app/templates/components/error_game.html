<div x-show="hasError" 
     x-cloak
     x-transition.opacity.duration.300ms
     class="fixed inset-0 z-[200] bg-midnight/95 backdrop-blur-xl flex flex-col items-center justify-center p-4">
    
    <div class="text-center mb-4 md:mb-6">
        <h2 class="text-2xl md:text-3xl font-black text-electric tracking-widest uppercase shadow-electric mb-2" x-text="t('crypto_jump')">Крипто-Прыжок</h2>
        <p class="text-acid font-mono text-[10px] md:text-xs uppercase tracking-widest animate-pulse" x-text="t('game_instructions')">Нажми ПРОБЕЛ или тапни по экрану</p>
    </div>

    <div class="relative flex-shrink-0">
        <canvas id="gameCanvas" width="400" height="600" 
                class="border border-gray-800 rounded-3xl shadow-neon-strong bg-darkglass max-w-full h-auto max-h-[60vh] object-contain">
        </canvas>
    </div>

    <button @click="hasError = false" 
            class="mt-6 md:mt-8 px-6 py-3 border border-red-500/50 text-red-500 hover:text-red-400 font-mono font-bold text-sm rounded-xl hover:bg-red-500/10 hover:shadow-[0_0_15px_rgba(239,68,68,0.2)] transition-all uppercase tracking-widest cursor-pointer active:scale-95"
            x-text="t('close_terminal')">
        Закрыть терминал
    </button>
</div>
