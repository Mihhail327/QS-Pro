<div x-show="showSidebar" 
     @click="showSidebar = false" 
     x-transition:enter="transition opacity ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] md:hidden" x-cloak>
</div>

<aside :class="showSidebar ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
       class="fixed top-0 left-0 h-full w-72 bg-gray-900 border-r border-gray-800 z-[70] transition-transform duration-300 ease-in-out flex flex-col shadow-2xl">
    
    <div class="p-6 border-b border-gray-800 flex justify-between items-center">
        <div class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 uppercase tracking-tighter">QS PRO</div>
        <button @click="showSidebar = false" class="md:hidden text-gray-500 text-2xl">&times;</button>
    </div>

    <div class="flex-grow p-6 space-y-8 overflow-y-auto custom-scrollbar">
        <div>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Режим работы</p>
            <div class="grid grid-cols-2 bg-gray-800/50 p-1 rounded-xl border border-gray-700/50">
                <button @click="role = 'user'" :class="role === 'user' ? 'bg-blue-600 text-white' : 'text-gray-500'" class="py-2 rounded-lg text-[10px] font-bold transition-all uppercase">User</button>
                <button @click="role = 'dev'" :class="role === 'dev' ? 'bg-emerald-600 text-white' : 'text-gray-500'" class="py-2 rounded-lg text-[10px] font-bold transition-all uppercase">Dev</button>
            </div>
        </div>

        <div class="space-y-3">
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Система</p>
            
            <button class="w-full flex items-center gap-3 p-3 rounded-xl bg-gray-800/30 border border-gray-700/50 hover:bg-gray-800 transition-all text-xs text-gray-300 text-left">
                <span>🔑</span> Сменить ключ
            </button>
            
            <button class="w-full flex items-center gap-3 p-3 rounded-xl bg-gray-800/30 border border-gray-700/50 hover:bg-gray-800 transition-all text-xs text-gray-300 text-left">
                <span>🎨</span> Тема оформления
            </button>

            <a href="/snippets/export" download="qs_pro_backup.json" 
               class="w-full flex items-center gap-3 p-3 rounded-xl bg-gray-800/30 border border-gray-700/50 hover:bg-blue-600/20 hover:border-blue-500/30 transition-all text-xs text-gray-300 text-left">
                <span>📥</span> Экспорт JSON
            </a>
        </div>
    </div>

    <div class="p-6 border-t border-gray-800 bg-gray-900/50 backdrop-blur-md">
        <div class="flex items-center justify-between group">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-emerald-500 flex items-center justify-center text-[10px] font-black text-white shadow-lg shadow-blue-500/20">
                    {{ user.username[0].upper() if user else '?' }}
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold text-gray-200 truncate max-w-[100px]">{{ user.username if user else 'Guest' }}</span>
                    <span class="text-[9px] text-emerald-500 font-bold uppercase tracking-tighter">Online</span>
                </div>
            </div>
            <button hx-post="/auth/logout" 
                    hx-target="body"
                    class="p-2 text-gray-500 hover:text-red-400 transition-colors" title="Выйти">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </button>
        </div>
    </div>
</aside>
